<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Link to External CSS (untuk background & button) -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased">

    <main class="relative min-h-screen flex items-center justify-center overflow-hidden text-center p-6">
        <!-- Efek Latar Belakang (sama seperti halaman utama) -->
        <div class="absolute inset-0 z-0">
            <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-cyan-500 rounded-full mix-blend-screen filter blur-3xl opacity-20 animate-pulse"></div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-sky-500 rounded-full mix-blend-screen filter blur-3xl opacity-20 animate-pulse delay-1000"></div>
        </div>

        <div class="relative z-10">
            <h1 class="text-8xl md:text-9xl font-extrabold gradient-text leading-tight mb-4">
                404
            </h1>
            <h2 class="text-2xl md:text-4xl font-bold text-white mt-4">
                Halaman Tidak Ditemukan
            </h2>
            <p class="text-lg text-slate-400 max-w-lg mx-auto mt-4">
                Oops! Sepertinya Anda tersesat. Halaman yang Anda cari mungkin telah dihapus atau tidak pernah ada.
            </p>
            <a href="/" class="mt-8 inline-block btn-primary text-white font-bold py-3 px-8 rounded-full text-lg hover:shadow-lg hover:shadow-cyan-500/50 transform hover:-translate-y-1 transition-all duration-300">
                Kembali ke Beranda
            </a>
        </div>
    </main>

</body>
</html>
