<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased h-screen w-screen flex items-center justify-center overflow-hidden">

    <main class="relative z-10 card-bg p-12 rounded-lg max-w-xl text-center border-t-red-500/50">
        <div class="w-20 h-20 rounded bg-red-900/30 border border-red-500/50 flex items-center justify-center mx-auto mb-6">
            <i data-lucide="triangle-alert" class="w-10 h-10 text-red-500"></i>
        </div>
        
        <h1 class="text-7xl font-mono font-bold text-white leading-tight tracking-tighter mb-2">
            404
        </h1>
        <div class="inline-block border border-slate-700 bg-slate-800 px-3 py-1 rounded text-xs text-slate-400 font-mono tracking-widest mb-6">
            ERROR 404: HALAMAN TIDAK DITEMUKAN
        </div>
        
        <p class="text-sm text-slate-400 mb-8 leading-relaxed">
            Maaf, halaman yang Anda cari mungkin telah dihapus, dipindahkan, atau memang tidak pernah ada. Coba periksa kembali alamat yang Anda tuju.
        </p>
        
        <a href="/" class="btn-primary py-3 px-8 text-sm font-bold w-full sm:w-auto inline-flex items-center justify-center gap-2">
            <i data-lucide="home" class="w-4 h-4"></i> Kembali ke Beranda
        </a>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
